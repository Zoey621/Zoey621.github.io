<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Page Web</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="project-page-web">
        <!-- Background Texture -->
        <div class="texture-background">
            <div class="texture-overflow">
                <img src="src/imports/ProjectPageWeb/d0dff3cb6351a3fd4e0f8e47edd09d5227511ec3.png" alt="" class="texture-image">
            </div>
        </div>

        <!-- Bottom Red Bar -->
        <div class="red-bar-bottom"></div>

        <!-- Top Red Bar -->
        <div class="red-bar-top"></div>

        <!-- Diagonal Shape -->
        <div class="diagonal-shape">
            <svg fill="none" preserveAspectRatio="none" viewBox="0 0 621 25">
                <path d="M0 25L56.0903 0H621L0 25Z" fill="#D72740" />
            </svg>
        </div>

        <!-- Distressed Hunan House Ad -->
        <div class="project-item hunan-house">
            <div class="project-transform-wrapper">
                <div class="project-rotated" style="transform: rotate(7.4deg);">
                    <div class="project-image-container">
                        <img src="src/imports/ProjectPageWeb/97bd0f8e7e8397b8fab4935b7e8fa3465b39afdf.png" alt="Distressed Hunan House Ad">
                    </div>
                </div>
            </div>
        </div>

        <!-- Game Week Cover Image -->
        <div class="project-item game-week">
            <div class="project-transform-wrapper">
                <div class="project-rotated" style="transform: rotate(-6.55deg);">
                    <div class="project-image-container">
                        <img src="src/imports/ProjectPageWeb/1fc6ab1bb11784e57a51b34da516dc18de61b20c.png" alt="Game Week Cover Image">
                    </div>
                </div>
            </div>
        </div>

        <!-- Type Booklet Projects Page -->
        <div class="project-item type-booklet">
            <div class="project-transform-wrapper">
                <div class="project-rotated" style="transform: rotate(-18.15deg);">
                    <div class="project-image-container">
                        <img src="src/imports/ProjectPageWeb/03ef60e8aa9b9b96e4803c7bdd76cff1d1d6862e.png" alt="Booklet Correct Sizing">
                    </div>
                </div>
            </div>
        </div>

        <!-- Senior Poster Projects Page -->
        <div class="project-item senior-poster">
            <div class="project-transform-wrapper">
                <div class="project-rotated" style="transform: rotate(11.18deg);">
                    <div class="project-image-container">
                        <img src="src/imports/ProjectPageWeb/b2fa8f38ca72c0e2a4c044c9d10589655a8b5c9b.png" alt="Alyssa Gray Senior Poster">
                    </div>
                </div>
            </div>
        </div>

        <!-- Works Title -->
        <p class="works-title">Works</p>

        <!-- Torn Smilodons Logo -->
        <div class="project-item torn-smilodons">
            <div class="project-transform-wrapper">
                <div class="project-rotated" style="transform: rotate(7.99deg);">
                    <div class="project-image-container logo-shadow">
                        <img src="src/imports/ProjectPageWeb/769575a439fc3af77ae0efc808429930680dca26.png" alt="Torn Smilodons Logo">
                    </div>
                </div>
            </div>
        </div>

        <!-- Web Navigation -->
        <nav class="web-nav">
            <p class="nav-item">Home</p>
            <p class="nav-item">Works</p>
            <p class="nav-item">About Me</p>
            <p class="nav-item">Contact</p>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
